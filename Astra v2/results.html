<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Astra Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0b0b0f; --accent:#00e5ff; --accent2:#7c5cfc;
      --text:#e8eaf6; --muted:rgba(255,255,255,0.4);
      --chrome-bg:rgba(18,18,26,0.95); --chrome-border:rgba(255,255,255,0.08);
    }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
    canvas { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.4; }

    /* CHROME TOP BAR */
    .chrome-bar {
      position:fixed; top:0; left:0; right:0; height:60px;
      background:var(--chrome-bg); border-bottom:1px solid var(--chrome-border);
      backdrop-filter:blur(20px); display:flex; align-items:center;
      gap:10px; padding:0 16px; z-index:1000;
    }
    .nav-btns { display:flex; gap:4px; }
    .nav-btn {
      width:34px; height:34px; border:none; border-radius:50%;
      background:transparent; color:var(--muted); font-size:16px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background 0.2s,color 0.2s;
    }
    .nav-btn:hover { background:rgba(255,255,255,0.08); color:var(--text); }

    .address-bar-wrap { flex:1; position:relative; display:flex; align-items:center; }
    .address-bar {
      width:100%; padding:9px 44px 9px 40px;
      background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.1);
      border-radius:24px; color:var(--text); font-family:'DM Sans',sans-serif;
      font-size:14px; outline:none; transition:all 0.3s;
    }
    .address-bar:focus { background:rgba(255,255,255,0.08); border-color:rgba(0,229,255,0.5); box-shadow:0 0 0 3px rgba(0,229,255,0.1); }
    .address-bar::placeholder { color:rgba(255,255,255,0.25); }
    .addr-icon { position:absolute; left:14px; font-size:14px; color:var(--muted); pointer-events:none; }
    .addr-search-btn {
      position:absolute; right:10px;
      background:linear-gradient(135deg,#00e5ff,#7c5cfc);
      border:none; border-radius:50%; width:28px; height:28px;
      color:white; font-size:13px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }

    .user-area { display:flex; align-items:center; gap:10px; margin-left:8px; }
    .user-name { font-size:13px; color:var(--muted); display:none; }
    @media(min-width:640px){ .user-name { display:block; } }
    .user-avatar {
      width:32px; height:32px; border-radius:50%;
      background:linear-gradient(135deg,#00e5ff,#7c5cfc);
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:700; color:white; flex-shrink:0;
    }
    .logout-btn {
      padding:7px 16px; background:rgba(255,95,109,0.12);
      border:1px solid rgba(255,95,109,0.3); border-radius:20px;
      color:#ff5f6d; font-size:12px; font-weight:600; cursor:pointer;
      transition:all 0.2s; white-space:nowrap; display:flex; align-items:center; gap:6px;
    }
    .logout-btn:hover { background:rgba(255,95,109,0.2); }

    /* RESULTS TABS BAR */
    .tabs-bar {
      position:fixed; top:60px; left:0; right:0; height:44px;
      background:rgba(12,12,18,0.95); border-bottom:1px solid rgba(255,255,255,0.06);
      backdrop-filter:blur(10px); z-index:999;
      display:flex; align-items:center; padding:0 20px; gap:4px;
    }
    .tab-btn {
      padding:6px 16px; border:none; background:transparent;
      color:var(--muted); font-family:'DM Sans',sans-serif; font-size:13px;
      cursor:pointer; border-bottom:2px solid transparent;
      transition:all 0.2s; border-radius:0;
    }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-btn:hover { color:var(--text); }

    /* MAIN LAYOUT */
    .main { position:relative; z-index:10; padding-top:120px; display:flex; gap:0; }
    .results-col {
      flex:1; padding:20px 24px; max-width:720px;
      margin:0 auto;
    }

    /* Result count */
    .result-meta { font-size:12px; color:var(--muted); margin-bottom:20px; letter-spacing:0.5px; }
    .result-meta span { color:var(--accent); }

    /* Cards */
    .card {
      padding:16px 0; border-bottom:1px solid rgba(255,255,255,0.06);
      cursor:pointer; transition:all 0.2s;
      animation: fadeUp 0.4s ease both;
    }
    .card:hover { padding-left:8px; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .card-url { font-size:12px; color:#00c96e; margin-bottom:4px; display:flex; align-items:center; gap:6px; }
    .card-url .site-icon { font-size:14px; }
    .card h3 { font-size:18px; font-weight:500; color:#4da6ff; margin-bottom:5px; transition:color 0.2s; }
    .card:hover h3 { color:#66b3ff; text-decoration:underline; }
    .card p { font-size:13px; color:rgba(255,255,255,0.55); line-height:1.6; }

    /* No results */
    .no-results { text-align:center; padding:60px 20px; }
    .no-results .emoji { font-size:48px; margin-bottom:16px; }
    .no-results h2 { font-size:22px; color:var(--muted); margin-bottom:8px; }
    .no-results p { font-size:14px; color:rgba(255,255,255,0.25); }
    .try-google {
      display:inline-block; margin-top:24px; padding:12px 28px;
      background:linear-gradient(135deg,#00e5ff,#7c5cfc);
      border:none; border-radius:28px; color:white;
      font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
      cursor:pointer; text-decoration:none; transition:transform 0.2s;
    }
    .try-google:hover { transform:translateY(-2px); }

    /* Scrollbar */
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-thumb { background:var(--accent); border-radius:10px; }
  </style>
</head>
<body>

<!-- CHROME TOP BAR -->
<div class="chrome-bar">

    <button class="nav-btn" onclick="window.location.href='astra.html'" title="Back to Home">&#8592;</button>
    <button class="nav-btn" onclick="history.forward()" title="Forward">&#8594;</button>
    <button class="nav-btn" onclick="location.reload()" title="Refresh">&#8635;</button>
  </div>

  <div class="address-bar-wrap">
    <span class="addr-icon">🔍</span>
    <input class="address-bar" id="addressBar" placeholder="Search Astra..."
      onkeydown="if(event.key==='Enter') newSearch()"/>
    <button class="addr-search-btn" onclick="newSearch()">➤</button>
  </div>

<!-- Particle Background -->
<script>
  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  let particles = [];
  for(let i=0;i<80;i++) particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1+0.3,dx:(Math.random()-0.5)*0.3,dy:(Math.random()-0.5)*0.3,o:Math.random()*0.3+0.1,c:Math.random()>0.5?"0,229,255":"124,92,252"});
  function animateBg(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${p.c},${p.o})`;ctx.fill();});requestAnimationFrame(animateBg);}
  animateBg();
  window.addEventListener("resize",()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
</script>

let currentQuery = "";
let currentTab = "all";

function getQuery(){
  return new URLSearchParams(window.location.search).get("q") || "";
}

function displayResults(tab){
  const q = currentQuery.toLowerCase();
  const container = document.getElementById("results");
  const meta = document.getElementById("resultMeta");

  let filtered = pages.filter(p=>{
    const matchQuery = p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.url.toLowerCase().includes(q);
    const matchTab = tab==="all" || (p.tags && p.tags.includes(tab));
    return matchQuery && matchTab;
  });

  // Score sorting
  filtered = filtered.map(p=>{
    let score=0;
    if(p.title.toLowerCase().includes(q)) score+=3;
    if(p.desc.toLowerCase().includes(q)) score+=1;
    return {...p,score};
  }).sort((a,b)=>b.score-a.score);

  if(filtered.length===0){
    meta.innerHTML = `Showing <span>0</span> results for "<span>${currentQuery}</span>"`;
    container.innerHTML = `
      <div class="no-results">
        <div class="emoji">🔭</div>
        <h2>No results found</h2>
        <p>Try different keywords or search on Google</p>
        <a class="try-google" href="https://www.google.com/search?q=${encodeURIComponent(currentQuery)}" target="_blank">🌐 Search on Google</a>
      </div>`;
    return;
  }

  meta.innerHTML = `About <span>${filtered.length}</span> results for "<span>${currentQuery}</span>"`;
  container.innerHTML = filtered.map((r,i)=>`
    <div class="card" style="animation-delay:${i*0.04}s" onclick="openPage('${r.url}')">
      <div class="card-url">
        <span class="site-icon">🌐</span>
        <span>${r.url}</span>
      </div>
      <h3>${r.title}</h3>
      <p>${r.desc}</p>
    </div>
  `).join("");
}

function openPage(url){ window.open(url,"_blank"); }

function newSearch(){
  const q = document.getElementById("addressBar").value.trim();
  if(!q) return;
  window.location.href = "results.html?q=" + encodeURIComponent(q);
}

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab"+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add("active");
  displayResults(tab);
}

// Init
window.addEventListener("DOMContentLoaded",()=>{
  currentQuery = getQuery();
  document.getElementById("addressBar").value = currentQuery;
  document.title = `Astra — ${currentQuery}`;
  displayResults("all");
});

document.addEventListener("keydown",(e)=>{ if(e.key==="Enter") newSearch(); });
